syntax = "proto3";

message Empty {}

message CreateTodoRequest {
  string title = 1;
  string description = 2;
}

message UpdateTodoRequest {
  int32 id = 1;
  string title = 2;
  string description = 3;
  bool is_completed = 4;
}

message DeleteTodoRequest {
  int32 id = 1;
}

message TodoResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  bool is_completed = 4;
}

message TodoListResponse {
  repeated TodoResponse todos = 1;
}


service TodoService {
  rpc CreateTodo (CreateTodoRequest) returns (TodoResponse);
  rpc GetTodos (Empty) returns (TodoListResponse);
  rpc UpdateTodo (UpdateTodoRequest) returns (TodoResponse);
  rpc DeleteTodo (DeleteTodoRequest) returns (Empty);
}